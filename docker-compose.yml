version: '3.8'

services:
  backend:
    build: ./backend
    container_name: dms_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////data/dms.db
      - REDIS_URL=redis://redis:6379/0
      - DOWNLOAD_DIR=/data/downloads
    depends_on:
      - redis

  worker:
    build: ./backend
    container_name: dms_worker
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////data/dms.db
      - REDIS_URL=redis://redis:6379/0
      - DOWNLOAD_DIR=/data/downloads
    depends_on:
      - redis
      - backend

  bot:
    build: ./backend
    container_name: dms_bot
    restart: unless-stopped
    command: python -m app.telegram.bot
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////data/dms.db
      - REDIS_URL=redis://redis:6379/0
      - DOWNLOAD_DIR=/data/downloads
    depends_on:
      - redis
      - backend

  redis:
    image: redis:7-alpine
    container_name: dms_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dms_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  redis_data:
